<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>姚锋 · 产品摄影</title>
<style>
:root{--bg:#0a0a0a;--text:#fff;--text2:rgba(255,255,255,.55);--text3:rgba(255,255,255,.3);--border:rgba(255,255,255,.08)}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--bg);border-bottom:1px solid var(--border)}
nav .logo{font-size:15px;font-weight:600;letter-spacing:-.2px}
nav .links{display:flex;gap:28px}
nav .links a{color:var(--text2);text-decoration:none;font-size:13px;letter-spacing:-.1px;transition:color .2s}
nav .links a:hover,nav .links a.active{color:var(--text)}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}

.overlay-menu{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);flex-direction:column;justify-content:center;align-items:center;gap:28px}
.overlay-menu.active{display:flex}
.overlay-menu a{color:var(--text2);text-decoration:none;font-size:20px;letter-spacing:-.2px}
.overlay-menu .close{position:absolute;top:20px;right:28px;background:none;border:none;color:var(--text);font-size:28px;cursor:pointer}

main{padding-top:56px}

/* Hero */
.hero{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--bg)}
.hero-item{aspect-ratio:4/3;overflow:hidden;cursor:pointer;position:relative}
.hero-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s,opacity .4s}
.hero-item:hover img{transform:scale(1.04)}
.hero-item .hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
.hero-item:hover .hero-overlay{opacity:1}
.hero-item .hero-overlay span{color:#fff;font-size:14px;font-weight:500;letter-spacing:1px;text-transform:uppercase}

/* Sections */
.section{padding:64px 32px;max-width:1400px;margin:0 auto}
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.section-title{font-size:22px;font-weight:500;margin-bottom:32px;letter-spacing:-.3px;line-height:1.3}
.section-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.section-card{cursor:pointer;position:relative}
.section-card .card-img{aspect-ratio:3/4;overflow:hidden;background:#1a1a1a}
.section-card .card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s,opacity .4s}
.section-card:hover .card-img img{transform:scale(1.03);opacity:.85}
.section-card .card-title{margin-top:10px;font-size:13px;font-weight:400;letter-spacing:-.1px;color:var(--text)}
.section-card .card-count{font-size:11px;color:var(--text3);margin-top:2px}

/* Breadcrumb */
.breadcrumb{padding:24px 32px 0;font-size:12px;color:var(--text3)}
.breadcrumb span{cursor:pointer;color:var(--text2);transition:color .2s}
.breadcrumb span:hover{color:var(--text)}

/* Gallery / Video grid */
.gallery-wrap{padding:16px 32px 64px;max-width:1400px;margin:0 auto}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.gallery-card{cursor:pointer;overflow:hidden;background:#1a1a1a;aspect-ratio:4/3;position:relative}
.gallery-card img{width:100%;height:100%;object-fit:cover;transition:transform .3s,opacity .3s}
.gallery-card:hover img{transform:scale(1.03);opacity:.8}
.video-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.video-card{cursor:pointer;position:relative;aspect-ratio:16/9;overflow:hidden;background:#1a1a1a}
.video-card video{width:100%;height:100%;object-fit:cover}
.video-card:hover video{opacity:.8}
.video-card .vplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:22px;pointer-events:none}
.video-card .vlabel{margin-top:8px;font-size:13px}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.97);justify-content:center;align-items:center;cursor:pointer}
.lightbox.active{display:flex}
.lightbox img,.lightbox video{max-width:92vw;max-height:92vh;object-fit:contain}
.lightbox .lbclose{position:absolute;top:20px;right:28px;color:#fff;font-size:32px;cursor:pointer;z-index:301}

/* Footer */
footer{padding:48px 32px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;max-width:1400px;margin:0 auto}
footer .col{min-width:140px}
footer .col strong{display:block;font-size:12px;margin-bottom:8px;color:var(--text)}
footer .col a{display:block;font-size:11px;color:var(--text3);text-decoration:none;margin-bottom:4px;transition:color .2s}
footer .col a:hover{color:var(--text2)}
footer .copyright{margin-top:32px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:20px;max-width:1400px;margin-left:auto;margin-right:auto}

@media(max-width:768px){
  nav .links{display:none}
  .hamburger{display:block}
  .hero{grid-template-columns:1fr}
  .section{padding:40px 16px}
  .section-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .video-grid{grid-template-columns:1fr}
  footer{flex-direction:column}
}
</style>
</head>
<body>

<nav>
  <span class="logo">姚锋</span>
  <div class="links" id="nav-links">
    <a href="#" class="active" onclick="goHome();return!1">作品</a>
    <a href="#" onclick="showCat('白底图');return!1">白底图</a>
    <a href="#" onclick="showCat('场景图');return!1">场景图</a>
    <a href="#" onclick="showCat('视频');return!1">视频</a>
    <a href="#footer">关于</a>
  </div>
  <button class="hamburger" onclick="toggleMenu()">☰</button>
</nav>

<div class="overlay-menu" id="overlay">
  <button class="close" onclick="toggleMenu()">×</button>
  <a href="#" onclick="goHome();toggleMenu();return!1">作品</a>
  <a href="#" onclick="showCat('白底图');toggleMenu();return!1">白底图</a>
  <a href="#" onclick="showCat('场景图');toggleMenu();return!1">场景图</a>
  <a href="#" onclick="showCat('视频');toggleMenu();return!1">视频</a>
  <a href="#footer" onclick="toggleMenu()">关于</a>
</div>

<main id="main"></main>

<div class="lightbox" id="lb" onclick="closeLB()"><span class="lbclose">×</span></div>

<footer id="footer">
  <div class="col"><strong>姚锋</strong><a>产品摄影师</a></div>
  <div class="col"><strong>联系</strong><a>fengyao1021@gmail.com</a><a>13528423803</a></div>
</footer>

<script src="data.js"></script>
<script>
const D=PORTFOLIO_DATA;
let view='home',cat='',sub='';

function toggleMenu(){document.getElementById('overlay').classList.toggle('active')}

function goHome(){view='home';cat=sub='';updateNav();render()}
function showCat(c){view='cat';cat=c;sub='';updateNav();render()}
function showSub(c,s){view='sub';cat=c;sub=s;updateNav();render()}
function backToCat(){view='cat';sub='';updateNav();render()}

function updateNav(){
  document.querySelectorAll('#nav-links a').forEach((a,i)=>{
    a.classList.remove('active');
    if(view==='home'&&i===0)a.classList.add('active');
    if(view==='cat'&&((cat==='白底图'&&i===1)||(cat==='场景图'&&i===2)||(cat==='视频'&&i===3)))a.classList.add('active');
  });
}

// Helper: get random images for cards
function randomFrom(arr,n){const s=[...arr].sort(()=>Math.random()-.5);return s.slice(0,n)}

function render(){
  const m=document.getElementById('main');
  
  if(view==='home'){
    // Hero grid: 6 random images
    const all=[];for(const[,subs]of Object.entries(D.categories))for(const[,fs]of Object.entries(subs))fs.forEach(f=>all.push(f));
    const heroImgs=randomFrom(all,6);
    let hero=`<section class="hero">${heroImgs.map(x=>`<div class="hero-item" onclick="openLB('${x.path}')"><img src="${x.path}" loading="lazy"><div class="hero-overlay"><span>浏览</span></div></div>`).join('')}</section>`;
    
    // Category sections
    let sections='';
    const cats=[['白底图','产品静物 · 白底拍摄'],['场景图','环境场景 · 生活方式'],['视频','动态影像 · 视频作品']];
    for(const[cn,desc]of cats){
      const source=cn==='视频'?D.videos:D.categories[cn];
      if(!source)continue;
      const entries=Object.entries(source);
      const cards=randomFrom(entries,4);
      sections+=`<section class="section"><div class="section-label">${cn}</div><div class="section-title">${desc}</div><div class="section-grid">`;
      cards.forEach(([sname,files])=>{
        const img=files[Math.floor(Math.random()*files.length)];
        sections+=`<div class="section-card" onclick="showSub('${cn}','${sname}')"><div class="card-img"><img src="${img.path}" loading="lazy"></div><div class="card-title">${sname}</div><div class="card-count">${files.length} 张</div></div>`;
      });
      sections+=`</div></section>`;
    }
    m.innerHTML=hero+sections;
    return;
  }
  
  if(view==='cat'){
    const source=cat==='视频'?D.videos:D.categories[cat];
    if(!source){m.innerHTML='';return}
    const entries=Object.entries(source);
    let html=`<section class="section"><div class="section-label">${cat}</div><div class="section-title">共 ${entries.length} 个分类</div><div class="section-grid">`;
    entries.forEach(([sname,files])=>{
      const img=files[Math.floor(Math.random()*files.length)];
      const count=cat==='视频'?files.length+' 个':files.length+' 张';
      html+=`<div class="section-card" onclick="showSub('${cat}','${sname}')"><div class="card-img"><img src="${img.path}" loading="lazy"></div><div class="card-title">${sname}</div><div class="card-count">${count}</div></div>`;
    });
    html+=`</div></section>`;
    m.innerHTML=html;
    return;
  }
  
  if(view==='sub'){
    if(cat==='视频'){
      const vids=(D.videos||{})[sub]||[];
      if(!vids.length){m.innerHTML='';return}
      let html=`<div class="breadcrumb"><span onclick="goHome()">作品</span> / <span onclick="showCat('视频')">视频</span> / ${sub}</div><div class="gallery-wrap"><div class="video-grid">`;
      vids.forEach(v=>{html+=`<div><div class="video-card" onclick="openVideo('${v.path}')"><video src="${v.path}" preload="metadata" muted playsinline></video><div class="vplay">▶</div></div><div class="vlabel">${v.name.slice(0,40)}</div></div>`;});
      html+=`</div></div>`;m.innerHTML=html;return;
    }
    const imgs=((D.categories[cat]||{})[sub])||[];
    if(!imgs.length){m.innerHTML='';return}
    let html=`<div class="breadcrumb"><span onclick="goHome()">作品</span> / <span onclick="showCat('${cat}')">${cat}</span> / ${sub} (${imgs.length} 张)</div><div class="gallery-wrap"><div class="gallery-grid">`;
    imgs.forEach(x=>{html+=`<div class="gallery-card" onclick="openLB('${x.path}')"><img src="${x.path}" loading="lazy"></div>`;});
    html+=`</div></div>`;m.innerHTML=html;
  }
}

function openLB(p){const lb=document.getElementById('lb');lb.innerHTML='<span class="lbclose">×</span><img src="'+p+'">';lb.classList.add('active')}
function openVideo(p){const lb=document.getElementById('lb');lb.innerHTML='<span class="lbclose">×</span><video src="'+p+'" controls autoplay></video>';lb.classList.add('active')}
function closeLB(){document.getElementById('lb').classList.remove('active')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB()});

goHome();
</script>
</body>
</html>
