<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>е§љй”‹ В· дє§е“Ѓж‘„еЅ±</title>
<style>
:root{--black:#000;--gray:#f5f5f7;--text:#1d1d1f;--text2:rgba(0,0,0,0.5);--blue:#0071e3;--sidebar-w:240px;--header-h:48px}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--gray);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--black);color:#fff;z-index:100;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:16px 20px 12px;font-size:15px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-nav{flex:1;padding:8px 0}
.nav-item{cursor:pointer;user-select:none}
.nav-parent{display:flex;align-items:center;padding:9px 20px;font-size:13px;color:rgba(255,255,255,0.75);transition:all .15s;gap:8px}
.nav-parent:hover,.nav-parent.active{color:#fff;background:rgba(255,255,255,0.06)}
.nav-parent .arrow{font-size:10px;transition:transform .2s;opacity:0.4}
.nav-parent.open .arrow{transform:rotate(90deg)}
.nav-children{display:none}
.nav-children.open{display:block}
.nav-child{display:block;padding:6px 20px 6px 42px;font-size:12px;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .15s}
.nav-child:hover,.nav-child.active{color:#fff;background:rgba(255,255,255,0.04)}

.sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.08);font-size:11px;color:rgba(255,255,255,0.3)}

/* Main */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh}

/* Hero */
.hero{position:relative;width:100%;height:60vh;min-height:360px;overflow:hidden}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.55))}
.hero-text{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);text-align:center;z-index:2;color:#fff}
.hero-text h1{font-size:clamp(26px,4vw,48px);font-weight:600;line-height:1.08;letter-spacing:-.3px}
.hero-text p{font-size:15px;margin-top:6px;opacity:.8}
.hero-dots{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.hero-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer}
.hero-dots span.active{background:#fff}

/* Content */
.content{padding:40px 32px;max-width:1400px}
.content h2{font-size:22px;font-weight:600;margin-bottom:20px;color:var(--text)}
.breadcrumb{font-size:12px;color:var(--text2);margin-bottom:16px}
.breadcrumb span{cursor:pointer;color:var(--blue)}
.breadcrumb span:hover{text-decoration:underline}

/* Card grids */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.cat-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:4/3;background:#ddd;transition:transform .3s,box-shadow .3s}
.cat-card:hover{transform:scale(1.02);box-shadow:0 6px 30px rgba(0,0,0,.18)}
.cat-card img{width:100%;height:100%;object-fit:cover}
.cat-card .overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7));display:flex;align-items:flex-end;padding:16px}
.cat-card .overlay span{color:#fff;font-size:17px;font-weight:500}
.cat-card .count{font-size:12px;opacity:.7;margin-left:8px}

/* Image gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.img-card{border-radius:8px;overflow:hidden;cursor:pointer;background:#fff;transition:transform .3s,box-shadow .3s}
.img-card:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(0,0,0,.14)}
.img-card img{width:100%;height:180px;object-fit:cover;display:block}
.img-card .label{padding:8px 12px;font-size:11px;color:var(--text2)}

/* Video grid */
.video-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:1000px}
.video-card{position:relative;cursor:pointer;border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:#000;transition:transform .3s}
.video-card:hover{transform:scale(1.02)}
.video-card video{width:100%;height:100%;object-fit:cover}
.video-card .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;pointer-events:none}
.video-card .vlabel{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:13px}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.96);justify-content:center;align-items:center;cursor:pointer}
.lightbox.active{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain}
.lightbox video{max-width:92vw;max-height:92vh;outline:none}
.lightbox .close{position:absolute;top:16px;right:24px;color:#fff;font-size:34px;cursor:pointer;z-index:2001}

.empty{text-align:center;padding:80px 20px;color:var(--text2);font-size:15px}

/* Mobile */
@media(max-width:768px){
  .sidebar{width:100%;bottom:auto;height:auto;position:relative}
  .sidebar .nav-children{display:none!important}
  .main{margin-left:0}
  .hero{height:40vh;min-height:240px}
  .content{padding:20px 16px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .video-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">е§љй”‹</div>
  <nav class="sidebar-nav" id="sidenav"></nav>
  <div class="sidebar-footer">В© 2026 Product Photography</div>
</aside>

<main class="main">
  <section class="hero" id="hero">
    <div id="hero-slides"></div>
    <div class="hero-text"><h1>е§љй”‹</h1><p>дє§е“Ѓж‘„еЅ± В· з™Ѕеє•йќ™з‰© В· ењєж™Їи§†и§‰ В· и§†йў‘дЅње“Ѓ</p></div>
    <div class="hero-dots" id="hero-dots"></div>
  </section>
  <div class="content" id="content"></div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLB()"><span class="close">&times;</span></div>

<script src="data.js"></script>
<script>
const D=PORTFOLIO_DATA;
let curView='home',curCat='',curSub='';
let curSlide=0,timer,carouselSlides=[];

// Gather all images for carousel
(function(){
  for(const[,subs]of Object.entries(D.categories))for(const[,fs]of Object.entries(subs))fs.forEach(f=>carouselSlides.push(f));
  carouselSlides=carouselSlides.sort(()=>Math.random()-.5).slice(0,8);
  const s=document.getElementById('hero-slides'),d=document.getElementById('hero-dots');
  s.innerHTML=carouselSlides.map((x,i)=>`<div class="hero-slide${i?'':' active'}"><img src="${x.path}" loading="${i<2?'eager':'lazy'}"></div>`).join('');
  d.innerHTML=carouselSlides.map((_,i)=>`<span class="${i?'':' active'}" onclick="goSlide(${i})"></span>`).join('');
  timer=setInterval(()=>goSlide((curSlide+1)%carouselSlides.length),5000);
})();
function goSlide(i){document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===i));document.querySelectorAll('.hero-dots span').forEach((s,j)=>s.classList.toggle('active',j===i));curSlide=i;clearInterval(timer);timer=setInterval(()=>goSlide((curSlide+1)%carouselSlides.length),5000)}

// Build sidebar
function buildSidebar(){
  const nav=document.getElementById('sidenav');
  let h='<div class="nav-item"><div class="nav-parent'+(curView==='home'?' active':'')+'" onclick="goHome()">рџЏ  е…ЁйѓЁдЅње“Ѓ</div></div>';
  for(const[cat,subs]of Object.entries(D.categories)){
    const isOpen=curView==='cat'&&curCat===cat;
    h+=`<div class="nav-item"><div class="nav-parent${isOpen?' open active':''}" onclick="toggleCat('${cat}')"><span class="arrow">в–¶</span> ${cat} <span style="font-size:10px;opacity:.4;margin-left:auto">${Object.keys(subs).length}</span></div><div class="nav-children${isOpen?' open':''}">`;
    for(const sub of Object.keys(subs)){
      h+=`<div class="nav-child${(curView==='sub'&&curSub===sub)?' active':''}" onclick="goSub('${cat}','${sub}')">${sub}</div>`;
    }
    h+='</div></div>';
  }
  // Videos
  if(D.videos){
    const isOpen=curView==='cat'&&curCat==='и§†йў‘';
    h+=`<div class="nav-item"><div class="nav-parent${isOpen?' open active':''}" onclick="toggleCat('и§†йў‘')"><span class="arrow">в–¶</span> и§†йў‘ <span style="font-size:10px;opacity:.4;margin-left:auto">${Object.keys(D.videos).length}</span></div><div class="nav-children${isOpen?' open':''}">`;
    for(const sub of Object.keys(D.videos)){
      h+=`<div class="nav-child${(curView==='sub'&&curSub===sub)?' active':''}" onclick="goSub('и§†йў‘',sub)">${sub}</div>`;
    }
    h+='</div></div>';
  }
  nav.innerHTML=h;
}

function toggleCat(cat){
  if(curView==='cat'&&curCat===cat){goHome();return}
  curView='cat';curCat=cat;curSub='';
  buildSidebar();renderContent();
}

function goSub(cat,sub){
  curView='sub';curCat=cat;curSub=sub;
  buildSidebar();renderContent();
}

function goHome(){curView='home';curCat=curSub='';buildSidebar();renderContent()}

// Render content
function renderContent(){
  const el=document.getElementById('content');
  
  if(curView==='home'){
    let cards='';
    const catNames=['з™Ѕеє•е›ѕ','ењєж™Їе›ѕ','и§†йў‘'];
    for(const cat of catNames){
      let img;
      if(cat==='и§†йў‘'&&D.videos){
        const subs=Object.values(D.videos).flat();
        img=subs[Math.floor(Math.random()*subs.length)];
      }else if(D.categories[cat]){
        const all=Object.values(D.categories[cat]).flat();
        img=all[Math.floor(Math.random()*all.length)];
      }
      if(!img)continue;
      const count=cat==='и§†йў‘'?Object.values(D.videos).reduce((a,b)=>a+b.length,0):Object.values(D.categories[cat]||{}).reduce((a,b)=>a+b.length,0);
      cards+=`<div class="cat-card" onclick="toggleCat('${cat}')"><img src="${img.path}" loading="lazy"><div class="overlay"><span>${cat}<small class="count">${count} д»¶</small></span></div></div>`;
    }
    el.innerHTML=`<div class="card-grid">${cards}</div>`;
    return;
  }
  
  if(curView==='cat'){
    const isVideo=curCat==='и§†йў‘';
    const source=isVideo?D.videos:D.categories[curCat];
    if(!source){el.innerHTML='<div class="empty">жљ‚ж— е†…е®№</div>';return}
    
    let cards='';
    for(const[sub,files]of Object.entries(source)){
      const img=files[Math.floor(Math.random()*files.length)];
      cards+=`<div class="cat-card" onclick="goSub('${curCat}','${sub}')"><img src="${img.path}" loading="lazy"><div class="overlay"><span>${sub}<small class="count">${files.length}</small></span></div></div>`;
    }
    el.innerHTML=`<h2>${curCat}</h2><div class="card-grid">${cards}</div>`;
    return;
  }
  
  if(curView==='sub'){
    const isVideo=curCat==='и§†йў‘';
    
    if(isVideo){
      const vids=(D.videos||{})[curSub]||[];
      if(!vids.length){el.innerHTML='<div class="empty">жљ‚ж— и§†йў‘</div>';return}
      el.innerHTML=`<div class="breadcrumb"><span onclick="goHome()">е…ЁйѓЁ</span> вЂє <span onclick="toggleCat('и§†йў‘')">и§†йў‘</span> вЂє ${curSub}</div><div class="video-grid">${vids.map(v=>`<div class="video-card" onclick="openVideo('${v.path}')"><video src="${v.path}" preload="metadata" muted playsinline></video><div class="play">в–¶</div><div class="vlabel">${v.name.slice(0,40)}</div></div>`).join('')}</div>`;
      return;
    }
    
    const imgs=((D.categories[curCat]||{})[curSub])||[];
    if(!imgs.length){el.innerHTML='<div class="empty">жљ‚ж— е›ѕз‰‡</div>';return}
    el.innerHTML=`<div class="breadcrumb"><span onclick="goHome()">е…ЁйѓЁ</span> вЂє <span onclick="toggleCat('${curCat}')">${curCat}</span> вЂє ${curSub}</div><div class="gallery-grid">${imgs.map(x=>`<div class="img-card" onclick="openLB('${x.path}')"><img src="${x.path}" loading="lazy"><div class="label">${x.name.slice(0,35)}</div></div>`).join('')}</div>`;
  }
}

// Lightbox
function openLB(p){const lb=document.getElementById('lightbox');lb.innerHTML='<span class="close">&times;</span><img src="'+p+'">';lb.classList.add('active')}
function openVideo(p){const lb=document.getElementById('lightbox');lb.innerHTML='<span class="close">&times;</span><video src="'+p+'" controls autoplay style="max-width:92vw;max-height:92vh"></video>';lb.classList.add('active')}
function closeLB(){document.getElementById('lightbox').classList.remove('active')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB()});

// Init
buildSidebar();renderContent();
</script>
</body>
</html>
