<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>姚锋 · 产品摄影</title>
<style>
:root{--bg:#000;--text:#fff;--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.25)}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* Top bar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 28px;background:rgba(0,0,0,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.topbar .logo{font-size:14px;font-weight:600;letter-spacing:-.2px}
.hamburger{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px}

/* Slide menu */
.menu{position:fixed;top:0;left:0;bottom:0;z-index:200;width:280px;background:rgba(10,10,10,.97);backdrop-filter:blur(30px);transform:translateX(-100%);transition:transform .35s ease;padding:80px 32px 32px;display:flex;flex-direction:column;gap:20px}
.menu.open{transform:translateX(0)}
.menu a,.menu .menu-cat{color:var(--text2);text-decoration:none;font-size:16px;letter-spacing:-.2px;cursor:pointer;transition:color .2s}
.menu a:hover,.menu .menu-cat:hover{color:var(--text)}
.menu .menu-sub{padding-left:16px;display:none;flex-direction:column;gap:10px;margin-top:8px}
.menu .menu-cat.open+.menu-sub{display:flex}
.menu .menu-sub a{font-size:13px;color:var(--text3)}
.menu .menu-sub a:hover{color:var(--text2)}
.menu .close{position:absolute;top:18px;right:22px;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.4)}
.overlay.show{display:block}

/* Hero carousel */
.hero{position:relative;width:100%;height:100vh;overflow:hidden;margin-top:0}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 60%,rgba(0,0,0,.7))}
.hero-text{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);text-align:center;z-index:2}
.hero-text h1{font-size:clamp(22px,4vw,42px);font-weight:500;letter-spacing:-.3px;color:var(--text)}
.hero-text p{font-size:14px;margin-top:4px;color:var(--text2)}
.hero-dots{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.hero-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:background .3s}
.hero-dots span.active{background:var(--text)}

/* Category cards section */
.cats-section{padding:64px 28px;max-width:1200px;margin:0 auto}
.cats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
.cat-card{position:relative;aspect-ratio:16/10;overflow:hidden;cursor:pointer;border-radius:2px;background:#111}
.cat-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s,opacity .5s}
.cat-card:hover img{transform:scale(1.04);opacity:.7}
.cat-card .cat-info{position:absolute;bottom:0;left:0;right:0;padding:24px 20px;background:linear-gradient(transparent,rgba(0,0,0,.85))}
.cat-card .cat-info .cat-name{font-size:20px;font-weight:500;letter-spacing:-.2px}
.cat-card .cat-info .cat-count{font-size:12px;color:var(--text2);margin-top:3px}

/* Subcategory grid */
.sub-section{padding:48px 28px 64px;max-width:1200px;margin:0 auto}
.sub-section h2{font-size:20px;font-weight:500;margin-bottom:6px;letter-spacing:-.2px}
.sub-section .subtitle{font-size:13px;color:var(--text2);margin-bottom:28px}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.sub-card{cursor:pointer;position:relative;aspect-ratio:4/3;overflow:hidden;border-radius:2px;background:#111}
.sub-card img{width:100%;height:100%;object-fit:cover;transition:transform .4s,opacity .4s}
.sub-card:hover img{transform:scale(1.03);opacity:.75}
.sub-card .sub-info{position:absolute;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.sub-card .sub-info .sub-name{font-size:14px;font-weight:500}
.sub-card .sub-info .sub-count{font-size:11px;color:var(--text2);margin-top:2px}

/* Gallery */
.gallery-section{padding:32px 28px 80px;max-width:1400px;margin:0 auto}
.gallery-section h2{font-size:20px;font-weight:500;margin-bottom:20px}
.breadcrumb{font-size:12px;color:var(--text3);margin-bottom:16px}
.breadcrumb span{cursor:pointer;color:var(--text2);transition:color .2s}
.breadcrumb span:hover{color:var(--text)}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px}
.gallery-card{cursor:pointer;aspect-ratio:4/3;overflow:hidden;background:#111}
.gallery-card img{width:100%;height:100%;object-fit:cover;transition:transform .3s,opacity .3s}
.gallery-card:hover img{transform:scale(1.03);opacity:.8}
.video-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.video-card{cursor:pointer;position:relative;aspect-ratio:16/9;overflow:hidden;background:#111}
.video-card video{width:100%;height:100%;object-fit:cover}
.video-card:hover video{opacity:.8}
.video-card .vplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:20px;pointer-events:none}
.video-card .vlabel{margin-top:8px;font-size:13px}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.97);justify-content:center;align-items:center;cursor:pointer}
.lb.active{display:flex}
.lb img,.lb video{max-width:92vw;max-height:92vh;object-fit:contain}
.lb .lbclose{position:absolute;top:16px;right:24px;color:var(--text);font-size:30px;cursor:pointer;z-index:301}

/* Footer */
footer{padding:40px 28px;border-top:1px solid rgba(255,255,255,.06);text-align:center;font-size:12px;color:var(--text3)}
footer p{margin-bottom:3px}

@media(max-width:768px){
  .topbar{padding:0 16px}
  .hero{height:70vh;min-height:400px}
  .cats-section{padding:40px 16px}
  .cats-grid{grid-template-columns:1fr}
  .sub-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .video-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <button class="hamburger" onclick="openMenu()">☰</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="menu" id="menu">
  <button class="close" onclick="closeMenu()">×</button>
  <a href="#" onclick="goHome();closeMenu();return!1">全部作品</a>
  <div>
    <div class="menu-cat" onclick="this.classList.toggle('open')">白底图 ▸</div>
    <div class="menu-sub" id="menu-baidi"></div>
  </div>
  <div>
    <div class="menu-cat" onclick="this.classList.toggle('open')">场景图 ▸</div>
    <div class="menu-sub" id="menu-scene"></div>
  </div>
  <div>
    <div class="menu-cat" onclick="this.classList.toggle('open')">视频 ▸</div>
    <div class="menu-sub" id="menu-video"></div>
  </div>
  <a href="#footer" onclick="closeMenu()">关于</a>
</div>

<main id="main"></main>

<div class="lb" id="lb" onclick="closeLB()"><span class="lbclose">×</span></div>

<footer id="footer">
  <p>姚锋 · 产品摄影</p>
  <p>fengyao1021@gmail.com · 13528423803</p>
</footer>

<script src="data.js"></script>
<script>
const D=PORTFOLIO_DATA;
let view='home',cat='',sub='',curSlide=0,carousel=[],timer;

// Build menu subcategories
(function(){
  for(const[cat,subs]of Object.entries(D.categories)){
    const el=document.getElementById('menu-'+(cat==='白底图'?'baidi':cat==='场景图'?'scene':'video'));
    if(!el)continue;
    for(const s of Object.keys(subs))el.innerHTML+=`<a href="#" onclick="goSub('${cat}','${s}');closeMenu();return!1">${s}</a>`;
  }
  if(D.videos)for(const s of Object.keys(D.videos))document.getElementById('menu-video').innerHTML+=`<a href="#" onclick="goSub('视频','${s}');closeMenu();return!1">${s}</a>`;
})();

function openMenu(){document.getElementById('menu').classList.add('open');document.getElementById('overlay').classList.add('show')}
function closeMenu(){document.getElementById('menu').classList.remove('open');document.getElementById('overlay').classList.remove('show')}

function goHome(){view='home';cat=sub='';render();scrollTo(0,0)}
function goCat(c){view='cat';cat=c;sub='';render();scrollTo(0,0)}
function goSub(c,s){view='sub';cat=c;sub=s;render();scrollTo(0,0)}

// Carousel
function initCarousel(){
  const all=[];for(const[,subs]of Object.entries(D.categories))for(const[,fs]of Object.entries(subs))fs.forEach(f=>all.push(f));
  carousel=all.sort(()=>Math.random()-.5).slice(0,8);curSlide=0;
}
function renderCarousel(){
  return `<section class="hero"><div id="hero-slides">${carousel.map((x,i)=>`<div class="hero-slide${i?'':' active'}"><img src="${x.path}" loading="${i<2?'eager':'lazy'}"></div>`).join('')}</div><div class="hero-text"><h1>姚锋</h1><p>产品摄影 · 白底静物 · 场景视觉 · 视频作品</p></div><div class="hero-dots">${carousel.map((_,i)=>`<span class="${i?'':' active'}" onclick="jumpSlide(${i})"></span>`).join('')}</div></section>`;
}
function startCarousel(){clearInterval(timer);timer=setInterval(()=>{curSlide=(curSlide+1)%carousel.length;updateSlides()},5000)}
function jumpSlide(i){curSlide=i;updateSlides();clearInterval(timer);timer=setInterval(()=>{curSlide=(curSlide+1)%carousel.length;updateSlides()},5000)}
function updateSlides(){const ss=document.querySelectorAll('.hero-slide'),ds=document.querySelectorAll('.hero-dots span');ss.forEach((s,i)=>s.classList.toggle('active',i===curSlide));ds.forEach((d,i)=>d.classList.toggle('active',i===curSlide))}

function render(){
  const m=document.getElementById('main');
  
  if(view==='home'){
    initCarousel();
    let html=renderCarousel();
    html+=`<section class="cats-section"><div class="cats-grid">`;
    const catDefs=[['白底图','产品静物 · 白底拍摄'],['场景图','环境场景 · 生活方式'],['视频','动态影像 · 视频作品']];
    for(const[cn,desc]of catDefs){
      const src=cn==='视频'?D.videos:D.categories[cn];if(!src)continue;
      const all=Object.values(src).flat();
      const img=all[Math.floor(Math.random()*all.length)];
      const count=cn==='视频'?Object.values(D.videos).reduce((a,b)=>a+b.length,0)+' 个':Object.values(D.categories[cn]).reduce((a,b)=>a+b.length,0)+' 张';
      html+=`<div class="cat-card" onclick="goCat('${cn}')"><img src="${img.path}" loading="lazy"><div class="cat-info"><div class="cat-name">${cn}</div><div class="cat-count">${count}</div></div></div>`;
    }
    html+=`</div></section>`;
    m.innerHTML=html;
    startCarousel();
    return;
  }
  
  if(view==='cat'){
    const src=cat==='视频'?D.videos:D.categories[cat];if(!src){m.innerHTML='';return}
    const entries=Object.entries(src);
    let html=`<section class="sub-section"><h2>${cat}</h2><div class="subtitle">${entries.length} 个分类</div><div class="sub-grid">`;
    for(const[sname,files]of entries){
      const img=files[Math.floor(Math.random()*files.length)];
      html+=`<div class="sub-card" onclick="goSub('${cat}','${sname}')"><img src="${img.path}" loading="lazy"><div class="sub-info"><div class="sub-name">${sname}</div><div class="sub-count">${files.length} 件</div></div></div>`;
    }
    html+=`</div></section>`;m.innerHTML=html;return;
  }
  
  if(view==='sub'){
    if(cat==='视频'){
      const vids=(D.videos||{})[sub]||[];
      m.innerHTML=`<section class="gallery-section"><div class="breadcrumb"><span onclick="goHome()">全部</span> / <span onclick="goCat('视频')">视频</span> / ${sub}</div><div class="video-grid">${vids.map(v=>`<div><div class="video-card" onclick="openVideo('${v.path}')"><video src="${v.path}" preload="metadata" muted playsinline></video><div class="vplay">▶</div></div><div class="vlabel">${v.name.slice(0,30)}</div></div>`).join('')}</div></section>`;return;
    }
    const imgs=((D.categories[cat]||{})[sub])||[];
    m.innerHTML=`<section class="gallery-section"><div class="breadcrumb"><span onclick="goHome()">全部</span> / <span onclick="goCat('${cat}')">${cat}</span> / ${sub} · ${imgs.length} 张</div><div class="gallery-grid">${imgs.map(x=>`<div class="gallery-card" onclick="openLB('${x.path}')"><img src="${x.path}" loading="lazy"></div>`).join('')}</div></section>`;
  }
}

function openLB(p){const lb=document.getElementById('lb');lb.innerHTML='<span class="lbclose">×</span><img src="'+p+'">';lb.classList.add('active')}
function openVideo(p){const lb=document.getElementById('lb');lb.innerHTML='<span class="lbclose">×</span><video src="'+p+'" controls autoplay></video>';lb.classList.add('active')}
function closeLB(){document.getElementById('lb').classList.remove('active')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB()});

goHome();
</script>
</body>
</html>
