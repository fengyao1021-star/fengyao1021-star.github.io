<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姚锋 · 产品摄影</title>
<meta name="description" content="姚锋 - 产品摄影师，专注静物与商业摄影">
<style>
:root {
  --black:#000;--gray:#f5f5f7;--text:#1d1d1f;--text2:rgba(0,0,0,0.6);
  --blue:#0071e3;--nav-bg:rgba(0,0,0,0.82);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--black);color:#fff;-webkit-font-smoothing:antialiased}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:48px;display:flex;align-items:center;justify-content:center;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);transition:background .4s}
nav.transparent{background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none}
nav a{color:#fff;text-decoration:none;font-size:12px;margin:0 14px;opacity:.85;letter-spacing:-.12px}
nav a:hover{opacity:1}
.brand{font-weight:600;font-size:13px;opacity:1}

.hero{position:relative;width:100%;height:100vh;overflow:hidden}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,.6))}
.hero-text{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);text-align:center;z-index:2;width:90%;max-width:600px}
.hero-text h1{font-size:clamp(28px,5vw,52px);font-weight:600;line-height:1.08;letter-spacing:-.3px}
.hero-text p{font-size:17px;margin-top:8px;opacity:.8}
.hero-dots{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
.hero-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:background .3s}
.hero-dots span.active{background:#fff}
.hero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:2;font-size:32px;color:#fff;cursor:pointer;opacity:.6;padding:16px;user-select:none}
.hero-arrow:hover{opacity:1}
.hero-arrow.left{left:16px}
.hero-arrow.right{right:16px}

.tabs-wrap{position:sticky;top:48px;z-index:999;background:var(--gray);padding:12px 0;border-bottom:1px solid rgba(0,0,0,.08);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;justify-content:center;gap:6px;padding:0 20px;min-width:max-content}
.tab{padding:7px 16px;border-radius:980px;border:none;cursor:pointer;font-size:13px;font-family:inherit;background:transparent;color:var(--text);transition:all .2s;white-space:nowrap}
.tab:hover{background:rgba(0,0,0,.06)}
.tab.active{background:var(--text);color:#fff;font-weight:500}

.subtabs-wrap{background:var(--gray);padding:0 0 12px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.subtabs{display:flex;justify-content:center;gap:4px;padding:0 20px;min-width:max-content}
.subtab{padding:4px 12px;border-radius:980px;border:1px solid rgba(0,0,0,.1);cursor:pointer;font-size:11px;font-family:inherit;background:#fff;color:var(--text);transition:all .2s;white-space:nowrap}
.subtab:hover{border-color:rgba(0,0,0,.3)}
.subtab.active{background:var(--text);color:#fff;border-color:var(--text)}

.gallery{background:var(--gray);padding:4px 20px 60px;min-height:60vh}
.gallery-grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{border-radius:8px;overflow:hidden;cursor:pointer;background:#fff;transition:transform .3s,box-shadow .3s}
.card:hover{transform:scale(1.02);box-shadow:0 4px 24px rgba(0,0,0,.16)}
.card img{width:100%;height:200px;object-fit:cover;display:block}
.card .label{padding:10px 12px;font-size:11px;color:var(--text2)}
.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px}
.card video{width:100%;height:200px;object-fit:cover;display:block;background:#000}
.video-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.video-card{position:relative;cursor:pointer;border-radius:8px;overflow:hidden;background:#fff;transition:transform .3s,box-shadow .3s;aspect-ratio:16/9}
.video-card:hover{transform:scale(1.02);box-shadow:0 4px 24px rgba(0,0,0,.16)}
.video-card video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
.video-card .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;pointer-events:none}
.video-card .label{padding:10px 14px;font-size:12px;color:var(--text2);position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff}
@media(max-width:768px){.video-grid{grid-template-columns:1fr}}

.lightbox{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.95);justify-content:center;align-items:center;cursor:pointer}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
.lightbox video{max-width:90vw;max-height:90vh;outline:none}
.lightbox .close{position:absolute;top:20px;right:28px;color:#fff;font-size:36px;cursor:pointer}

footer{padding:60px 20px;text-align:center;font-size:12px;color:rgba(255,255,255,.4);background:var(--black)}
footer h2{font-size:28px;color:#fff;margin-bottom:12px;font-weight:600}
footer p{line-height:1.6;max-width:400px;margin:0 auto 8px}

@media(max-width:768px){
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .card img{height:140px}
  .hero-arrow{display:none}
}
</style>
</head>
<body>

<nav id="nav" class="transparent">
  <span class="brand">姚锋</span>
  <a href="#home">首页</a>
  <a href="#gallery">作品</a>
  <a href="#about">关于</a>
</nav>

<section class="hero" id="home">
  <div id="hero-slides"></div>
  <div class="hero-text"><h1>姚锋</h1><p>产品摄影 · 白底静物 · 场景视觉</p></div>
  <div class="hero-dots" id="hero-dots"></div>
  <div class="hero-arrow left" onclick="prevSlide()">‹</div>
  <div class="hero-arrow right" onclick="nextSlide()">›</div>
</section>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="subtabs-wrap" id="subtabs-wrap" style="display:none"><div class="subtabs" id="subtabs"></div></div>

<section class="gallery" id="gallery">
  <div class="gallery-grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">暂无图片</div>
</section>

<div class="lightbox" id="lightbox" onclick="closeLB()">
  <span class="close">&times;</span>
  <img id="lb-img" src="">
</div>

<footer id="about">
  <h2>关于我</h2>
  <p>产品摄影师，专注静物与商业摄影</p>
  <p>用光影讲述产品的故事</p>
  <p style="margin-top:20px">fengyao1021@gmail.com  ·  13528423803</p>
</footer>

<script src="data.js"></script>
<script>
const data=PORTFOLIO_DATA;let cur=0,cat='all',sub='all',timer;

(function renderCarousel(){
  const allImgs=[];
  for(const[,subs]of Object.entries(data.categories))for(const[,fs]of Object.entries(subs))fs.forEach(f=>allImgs.push(f));
  const shuffled=allImgs.sort(()=>Math.random()-.5).slice(0,8);
  const s=document.getElementById('hero-slides'),d=document.getElementById('hero-dots');
  s.innerHTML=shuffled.map((x,i)=>`<div class="hero-slide${i?'':' active'}"><img src="${x.path}" alt="${x.name}" loading="${i<2?'eager':'lazy'}"></div>`).join('');
  d.innerHTML=shuffled.map((_,i)=>`<span class="${i?'':' active'}" onclick="go(${i})"></span>`).join('');
  timer=setInterval(nextSlide,5000);
  window._carouselSlides=shuffled;
})();
function go(i){document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===i));document.querySelectorAll('.hero-dots span').forEach((s,j)=>s.classList.toggle('active',j===i));cur=i;clearInterval(timer);timer=setInterval(nextSlide,5000)}
function nextSlide(){const n=window._carouselSlides?.length||1;go((cur+1)%n)}
function prevSlide(){const n=window._carouselSlides?.length||1;go((cur-1+n)%n)}

window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('transparent',window.scrollY<100));

(function buildTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML='<button class="tab active" data-cat="all">全部</button>';
  for(const c of['白底图','场景图','视频'])t.innerHTML+=`<button class="tab" data-cat="${c}">${c}</button>`;
  t.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',function(){
    t.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));this.classList.add('active');
    cat=this.dataset.cat;sub='all';buildSubTabs();renderGallery();
  }));
})();

function buildSubTabs(){
  const w=document.getElementById('subtabs-wrap'),e=document.getElementById('subtabs');
  if(cat==='all'){w.style.display='none';return}
  if(cat==='视频'){w.style.display='block';e.innerHTML='<button class="subtab active" data-sub="all">全部视频</button>';for(const s of Object.keys(data.videos||{}))e.innerHTML+=`<button class="subtab" data-sub="${s}">${s}</button>`;e.querySelectorAll('.subtab').forEach(b=>b.addEventListener('click',function(){e.querySelectorAll('.subtab').forEach(x=>x.classList.remove('active'));this.classList.add('active');sub=this.dataset.sub;renderGallery()}));return}
  w.style.display='block';
  const subs=Object.keys(data.categories[cat]||{});
  e.innerHTML='<button class="subtab active" data-sub="all">全部子类</button>';
  subs.forEach(s=>e.innerHTML+=`<button class="subtab" data-sub="${s}">${s}</button>`);
  e.querySelectorAll('.subtab').forEach(b=>b.addEventListener('click',function(){
    e.querySelectorAll('.subtab').forEach(x=>x.classList.remove('active'));this.classList.add('active');
    sub=this.dataset.sub;renderGallery();
  }));
}

function renderGallery(){
  const g=document.getElementById('grid'),em=document.getElementById('empty');
  if(cat==='视频'){
    let vids=[];
    if(sub==='all')for(const[,fs]of Object.entries(data.videos||{}))fs.forEach(f=>vids.push(f));
    else vids=(data.videos||{})[sub]||[];
    if(!vids.length){g.innerHTML='';em.style.display='block';return}
    em.style.display='none';
    g.innerHTML=vids.map(x=>`<div class="video-card" onclick="openVideo('${x.path}')"><video src="${x.path}" preload="metadata" muted playsinline></video><div class="play">▶</div><div class="label">${x.name.slice(0,40)}</div></div>`).join('');
    g.className='video-grid';
    return;
  }
  let imgs=[];
  g.className='gallery-grid';
  if(cat==='all')for(const[c,subs]of Object.entries(data.categories))for(const[,fs]of Object.entries(subs))fs.forEach(f=>imgs.push(f));
  else if(sub==='all')for(const[,fs]of Object.entries(data.categories[cat]||{}))fs.forEach(f=>imgs.push(f));
  else imgs=(data.categories[cat]||{})[sub]||[];
  if(!imgs.length){g.innerHTML='';em.style.display='block';return}
  em.style.display='none';
  g.innerHTML=imgs.map(x=>`<div class="card" onclick="openLB('${x.path}')"><img src="${x.path}" alt="${x.name}" loading="lazy" onerror="this.style.display='none'"><div class="label">${x.name.slice(0,35)}</div></div>`).join('');
}

function openLB(p){document.getElementById('lb-img').src=p;document.getElementById('lightbox').classList.add('active')}
function openVideo(p){const lb=document.getElementById('lightbox');lb.innerHTML='<span class="close" onclick="closeLB()">&times;</span><video src="'+p+'" controls autoplay style="max-width:90vw;max-height:90vh"></video>';lb.classList.add('active')}
function closeLB(){document.getElementById('lightbox').classList.remove('active');document.getElementById('lightbox').innerHTML='<span class="close">&times;</span><img id="lb-img" src="">'}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB()});

buildSubTabs();renderGallery();
</script>
</body>
</html>
